<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đèn Kéo Quân - Nguyễn Hữu Trí</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0b0b;
            color: #ff00ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            perspective: 1500px; /* Tạo độ sâu cho không gian 3D */
            overflow: hidden;
        }

        h1 { margin-bottom: 2rem; text-shadow: 0 0 15px #ff00ff; }

        .back-link {
            position: absolute; top: 20px; left: 20px;
            color: #b388ff; text-decoration: none; font-weight: bold;
        }

        /* KHUNG CHỨA ĐÈN */
        .stage {
            width: 210px;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate-carousel 15s infinite linear;
            cursor: pointer;
        }

        /* Dừng khi rê chuột vào */
        .stage:hover {
            animation-play-state: paused;
        }

        .carousel__cell {
            position: absolute;
            width: 190px;
            height: 120px;
            left: 10px;
            top: 10px;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 15px #ff00ff;
            border-radius: 8px;
            overflow: hidden;
            background: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel__cell img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Định vị 6 mặt quanh vòng tròn (360 độ / 6 mặt = 60 độ mỗi mặt) */
        /* translateZ khoảng 170px-180px để các cạnh không bị đè lên nhau */
        .carousel__cell:nth-child(1) { transform: rotateY(  0deg) translateZ(180px); }
        .carousel__cell:nth-child(2) { transform: rotateY( 60deg) translateZ(180px); }
        .carousel__cell:nth-child(3) { transform: rotateY(120deg) translateZ(180px); }
        .carousel__cell:nth-child(4) { transform: rotateY(180deg) translateZ(180px); }
        .carousel__cell:nth-child(5) { transform: rotateY(240deg) translateZ(180px); }
        .carousel__cell:nth-child(6) { transform: rotateY(300deg) translateZ(180px); }

        @keyframes rotate-carousel {
            from { transform: rotateY(0deg); }
            to   { transform: rotateY(360deg); }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">&larr; Quay lại Portfolio</a>
    <h1>Đèn Kéo Quân 3D</h1>

    <div class="stage" id="lamp-carousel">
        <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1550439062-609e1531270e?w=500" alt="Hinh 1"></div>
        <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1511556532299-8f662fc26c06?w=500" alt="Hinh 2"></div>
        <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=500" alt="Hinh 3"></div>
        <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=500" alt="Hinh 4"></div>
        <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?w=500" alt="Hinh 5"></div>
        <div class="carousel__cell"><img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=500&q=80" alt="Hinh 6"></div>
    </div>

</body>
</html>
